<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fiche Sécurité RCY</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b3b63;
    color:white;
    text-align:center;
}

header{
    padding:30px 20px;
}

h1{
    margin-bottom:10px;
}

.slogan{
    font-size:18px;
    opacity:0.9;
}

.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

.btn{
    display:block;
    text-decoration:none;
    padding:22px;
    margin:15px 0;
    border-radius:15px;
    font-size:24px;
    font-weight:bold;
    color:white;
}

.urgence{
    background:#d62828;
}

.fiche{
    background:#2a9d8f;
}

.qrcode{
    background:#457b9d;
}

footer{
    margin-top:40px;
    font-size:14px;
    opacity:0.8;
}
</style>

</head>

<body>

<header>

<h1>🥾 Fiche Sécurité RCY</h1>

<div class="slogan">
Vos informations essentielles toujours à portée de main
</div>

</header>

<div class="container">

<a href="#" class="btn urgence">
🚨 URGENCE
</a>

<a href="#" class="btn fiche">
👤 MA FICHE
</a>

<a href="#" class="btn qrcode">
🔳 MON QR CODE
</a>

</div>

<footer>
Rando Club Yerrois
</footer>
<div id="fiche" style="display:none;background:white;color:#0b3b63;padding:20px;max-width:600px;margin:20px auto;border-radius:15px;">

<h2>👤 Ma fiche</h2>

<input type="text" placeholder="Nom" style="width:100%;padding:10px;margin:5px 0;">

<input type="text" placeholder="Prénom" style="width:100%;padding:10px;margin:5px 0;">

<input type="text" placeholder="Date de naissance" style="width:100%;padding:10px;margin:5px 0;">

<input type="text" placeholder="N° licence" style="width:100%;padding:10px;margin:5px 0;">

<input type="text" placeholder="Contact urgence 1" style="width:100%;padding:10px;margin:5px 0;">

<input type="text" placeholder="Téléphone urgence 1" style="width:100%;padding:10px;margin:5px 0;">

<textarea placeholder="Allergies" style="width:100%;padding:10px;margin:5px 0;"></textarea>

<textarea placeholder="Traitements" style="width:100%;padding:10px;margin:5px 0;"></textarea>

<button style="background:#2a9d8f;color:white;padding:15px;border:none;border-radius:10px;font-size:18px;">
💾 Enregistrer
</button>

</div>
    
</body>
</html>
